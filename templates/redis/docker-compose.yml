# ==============================================================================
# Redis Stack — In-memory data store
# ==============================================================================
#   compose-publisher deploy redis --env dev
#
#   Redis:  Cache, message broker, and session store.
#
#   Port: 6379
#
#   Usage:
#     Connect:    redis-cli -h localhost -a ${REDIS_PASSWORD}
#     Ping:       docker exec redis redis-cli -a ${REDIS_PASSWORD} ping
#     Monitor:    docker exec redis redis-cli -a ${REDIS_PASSWORD} monitor
# ==============================================================================

services:
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis} --maxmemory ${REDIS_MAXMEMORY:-256mb} --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    networks:
      - redis
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    mem_limit: ${REDIS_MEM_LIMIT:-512m}
    cpus: ${REDIS_CPUS:-0.5}

volumes:
  redis_data:

networks:
  redis:
    name: redis
