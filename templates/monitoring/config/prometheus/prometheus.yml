global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Application metrics (FastAPI /metrics endpoint)
  - job_name: "app"
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8080"]
    # For multiple apps, use file_sd or DNS-based discovery

  # Loki metrics
  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]

  # Tempo metrics
  - job_name: "tempo"
    static_configs:
      - targets: ["tempo:3200"]
