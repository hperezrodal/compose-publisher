# ==============================================================================
# Monitoring Stack — Prometheus + Grafana + Loki + Tempo
# ==============================================================================
#   compose-publisher deploy monitoring --env prod
#
#   Prometheus: metrics scraping + alerting
#   Loki:       log aggregation (structured JSON)
#   Tempo:      distributed tracing (OpenTelemetry)
#   Grafana:    dashboards + alerting UI
#
#   Apps push data via:
#     - /metrics endpoint (Prometheus scrapes)
#     - HTTP POST to Loki (structured logs)
#     - OTLP HTTP to Tempo (traces)
# ==============================================================================

services:
  # --------------------------------------------------------------------------
  # Prometheus — metrics
  # --------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.4.0
    container_name: prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}
      - --web.enable-lifecycle
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - monitoring
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`${PROMETHEUS_HOST:-prometheus.localhost}`)"
      - "traefik.http.routers.prometheus.entrypoints=websecure"
      - "traefik.http.routers.prometheus.tls.certresolver=letsencrypt"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
      - "traefik.http.routers.prometheus.middlewares=monitoring-auth"
      - "traefik.http.middlewares.monitoring-auth.basicauth.users=${MONITORING_BASIC_AUTH}"
    mem_limit: 512m
    cpus: 1.0

  # --------------------------------------------------------------------------
  # Loki — logs
  # --------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.5.0
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./config/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    networks:
      - monitoring
    mem_limit: 512m
    cpus: 1.0

  # --------------------------------------------------------------------------
  # Tempo — traces
  # --------------------------------------------------------------------------
  tempo:
    image: grafana/tempo:2.7.2
    container_name: tempo
    restart: unless-stopped
    command: -config.file=/etc/tempo/tempo.yml
    volumes:
      - ./config/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    ports:
      - "127.0.0.1:4318:4318"   # OTLP HTTP (apps send traces here)
    networks:
      - monitoring
    mem_limit: 512m
    cpus: 1.0

  # --------------------------------------------------------------------------
  # Grafana — dashboards
  # --------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:12.0.1
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://${GRAFANA_HOST:-grafana.localhost}
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    networks:
      - monitoring
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`${GRAFANA_HOST:-grafana.localhost}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    mem_limit: 256m
    cpus: 0.5

volumes:
  prometheus_data:
  loki_data:
  tempo_data:
  grafana_data:

networks:
  monitoring:
    name: monitoring
  proxy:
    name: proxy
    external: true
